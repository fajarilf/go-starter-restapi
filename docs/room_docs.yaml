room:
  get:
      tags: [Rooms]
      summary: List rooms (paginated)
      operationId: listRooms
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of items per page. Defaults to 10.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 10
      responses:
        "200":
          description: Paginated list of rooms
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorResponse"
  post:
      tags: [Rooms]
      summary: Create a room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./openapi.yaml#/components/schemas/RoomCreateRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "./openapi.yaml#/components/schemas/RoomResponse"
                  - properties:
                      status:
                        example: 201
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorResponse"

room-by-id:
  get:
      tags: [Rooms]
      summary: Get a room by ID
      operationId: getRoomById
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        "200":
          description: Room found
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomResponse"
        "400":
          description: Invalid ID or room not found
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorResponse"
  put:
      tags: [Rooms]
      summary: Update a room
      operationId: updateRoom
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./openapi.yaml#/components/schemas/RoomUpdateRequest"
      responses:
        "200":
          description: Room updated
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomResponse"
        "400":
          description: Invalid ID, request body, or room not found
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorResponse"
  delete:
      tags: [Rooms]
      summary: Delete a room
      operationId: deleteRoom
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        "200":
          description: Room deleted
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomDeleteResponse"
        "400":
          description: Invalid ID or room not found
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/ErrorResponse"
