login:
  post:
    tags: [Auth]
    summary: Login
    description: Authenticate and get a JWT token.
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "./openapi.yaml#/components/schemas/LoginRequest"
    responses:
      "200":
        description: Authentication successful
        content:
          application/json:
            schema:
              $ref: "./openapi.yaml#/components/schemas/LoginResponse"
      "400":
        $ref: "./openapi.yaml#/components/responses/BadRequest"
      "500":
        $ref: "./openapi.yaml#/components/responses/ServerError"

logout:
  post:
    tags: [Auth]
    security:
      - BearerAuth: []
    summary: Logout
    description: Revoke the current JWT token. Subsequent requests with this token will be rejected until server restart.
    operationId: logout
    responses:
      "200":
        description: Logged out successfully
      "401":
        $ref: "./openapi.yaml#/components/responses/Unauthorized"
      "500":
        $ref: "./openapi.yaml#/components/responses/ServerError"

room:
  get:
      tags: [Rooms]
      summary: List rooms (paginated)
      operationId: listRooms
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          description: Number of items per page. Defaults to 10.
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 10
      responses:
        "200":
          description: Paginated list of rooms
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomListResponse"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"
  post:
      tags: [Rooms]
      summary: Create a room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./openapi.yaml#/components/schemas/RoomCreateRequest"
      responses:
        "201":
          description: Room created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "./openapi.yaml#/components/schemas/RoomResponse"
                  - properties:
                      status:
                        example: 201
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequest"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"

room-by-id:
  get:
      tags: [Rooms]
      summary: Get a room by ID
      operationId: getRoomById
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        "200":
          description: Room found
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequest"
        "404":
          $ref: "./openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"
  put:
      tags: [Rooms]
      summary: Update a room
      operationId: updateRoom
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./openapi.yaml#/components/schemas/RoomUpdateRequest"
      responses:
        "200":
          description: Room updated
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequest"
        "404":
          $ref: "./openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"
  delete:
      tags: [Rooms]
      summary: Delete a room
      operationId: deleteRoom
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric room identifier
          schema:
            type: integer
            format: int32
            example: 1
      responses:
        "200":
          description: Room deleted
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomDeleteResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequest"
        "404":
          $ref: "./openapi.yaml#/components/responses/NotFound"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"

room-by-id-recover:
  post:
    tags: [Rooms]
    security:
      - BearerAuth: []
    summary: Recover a deleted room
    operationId: recoverRoom
    parameters:
    - name: id
      in: path
      required: true
      description: Numeric room identifier
      schema:
        type: integer
        format: int32
        example: 1
    responses:
        "200":
          description: Room Recovered
          content:
            application/json:
              schema:
                $ref: "./openapi.yaml#/components/schemas/RoomResponse"
        "400":
          $ref: "./openapi.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./openapi.yaml#/components/responses/Unauthorized"
        "404":
          $ref: "./openapi.yaml#/components/responses/NotFound"
        "409":
          $ref: "./openapi.yaml#/components/responses/ConflictError"
        "500":
          $ref: "./openapi.yaml#/components/responses/ServerError"
